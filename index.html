<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ecosystem Dynamics Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f1424;
color:white;
font-family:Segoe UI;
margin:0;
}

header{
padding:12px;
text-align:center;
font-size:22px;
background:#1b2238;
}

.layout{
display:flex;
gap:10px;
padding:10px;
}

canvas{
background:#11182c;
border-radius:8px;
}

.panel{
width:230px;
background:#1b2238;
padding:10px;
border-radius:8px;
}

button{
width:100%;
margin-top:6px;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2d3a5e;
color:white;
}

.chart{
height:160px;
margin-top:10px;
}

</style>

</head>

<body>

<header>Ecosystem Dynamics Simulator</header>

<div class="layout">

<div class="panel">

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<hr>

<button onclick="addParticles('tree')">Add Tree</button>
<button onclick="addParticles('water')">Add Water</button>
<button onclick="addParticles('population')">Add Population</button>
<button onclick="addParticles('industry')">Add Industry</button>
<button onclick="addParticles('economy')">Add Economy</button>
<button onclick="addParticles('pollution')">Add Pollution</button>

<div id="equilibrium" style="margin-top:10px;font-size:13px;"></div>

</div>

<canvas id="world" width="650" height="500"></canvas>

<div class="panel">

<canvas id="populationChart" class="chart"></canvas>
<canvas id="phaseChart" class="chart"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

let particles=[]
let running=false

const types=["tree","water","population","industry","economy","pollution"]

const colors={
tree:"#2ecc71",
water:"#3498db",
population:"#ecf0f1",
industry:"#7f8c8d",
economy:"#f1c40f",
pollution:"#e74c3c"
}

/* PARTICLE CLASS */

class Particle{

constructor(type){

this.type=type

this.x=Math.random()*650
this.y=Math.random()*500

this.vx=(Math.random()-0.5)*2
this.vy=(Math.random()-0.5)*2

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>650) this.vx*=-1
if(this.y<0||this.y>500) this.vy*=-1

}

draw(){

ctx.fillStyle=colors[this.type]

switch(this.type){

case "tree": drawTriangle(this.x,this.y); break
case "water": drawCircle(this.x,this.y); break
case "population": drawSquare(this.x,this.y); break
case "industry": drawDiamond(this.x,this.y); break
case "economy": drawHexagon(this.x,this.y); break
case "pollution": drawStar(this.x,this.y); break

}

}

}

/* SHAPES */

function drawCircle(x,y){
ctx.beginPath()
ctx.arc(x,y,4,0,Math.PI*2)
ctx.fill()
}

function drawSquare(x,y){
ctx.fillRect(x-3,y-3,6,6)
}

function drawTriangle(x,y){
ctx.beginPath()
ctx.moveTo(x,y-4)
ctx.lineTo(x-4,y+4)
ctx.lineTo(x+4,y+4)
ctx.fill()
}

function drawDiamond(x,y){
ctx.beginPath()
ctx.moveTo(x,y-4)
ctx.lineTo(x+4,y)
ctx.lineTo(x,y+4)
ctx.lineTo(x-4,y)
ctx.fill()
}

function drawHexagon(x,y){
ctx.beginPath()
for(let i=0;i<6;i++){
let a=i*Math.PI/3
ctx.lineTo(x+4*Math.cos(a),y+4*Math.sin(a))
}
ctx.fill()
}

function drawStar(x,y){
ctx.beginPath()
for(let i=0;i<5;i++){
let a=i*2*Math.PI/5
ctx.lineTo(x+4*Math.cos(a),y+4*Math.sin(a))
}
ctx.fill()
}

/* INITIAL */

function init(){

types.forEach(t=>{
for(let i=0;i<25;i++){
particles.push(new Particle(t))
}
})

}

init()

/* INTERACTIONS */

function interact(a,b){

if(a.type==="tree" && b.type==="population"){
if(Math.random()<0.2) a.type="dead"
}

if(a.type==="pollution" && b.type==="tree"){
if(Math.random()<0.5) a.type="dead"
}

if(a.type==="water" && b.type==="tree"){
if(Math.random()<0.15) particles.push(new Particle("tree"))
}

if(a.type==="pollution" && b.type==="population"){
if(Math.random()<0.2) b.type="dead"
}

}

/* COLLISION */

function collisions(){

for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){

let a=particles[i]
let b=particles[j]

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<6) interact(a,b)

}
}

particles=particles.filter(p=>p.type!=="dead")

}

/* COUNT */

function count(type){

return particles.filter(p=>p.type===type).length

}

/* EQUILIBRIUM */

function checkEquilibrium(){

let pop=count("population")
let pol=count("pollution")

if(Math.abs(pop-pol)<5){
document.getElementById("equilibrium").innerText="⚖ Ecosystem near equilibrium"
}else{
document.getElementById("equilibrium").innerText=""
}

}

/* CHARTS */

const popChart=new Chart(
document.getElementById("populationChart"),
{
type:"line",
data:{labels:[],datasets:types.map(t=>({
label:t,
data:[],
borderColor:colors[t]
}))}
}
)

const phaseChart=new Chart(
document.getElementById("phaseChart"),
{
type:"scatter",
data:{datasets:[{
label:"Population vs Pollution",
data:[],
backgroundColor:"#f39c12"
}]}
}
)

/* LOOP */

function loop(){

ctx.clearRect(0,0,650,500)

particles.forEach(p=>{
p.move()
p.draw()
})

collisions()

checkEquilibrium()

updateCharts()

if(running) requestAnimationFrame(loop)

}

function updateCharts(){

popChart.data.labels.push("")

types.forEach((t,i)=>{
popChart.data.datasets[i].data.push(count(t))
})

phaseChart.data.datasets[0].data.push({
x:count("population"),
y:count("pollution")
})

popChart.update()
phaseChart.update()

}

/* CONTROLS */

function start(){running=true;loop()}
function pause(){running=false}

function reset(){
particles=[]
init()
}

function addParticles(t){
for(let i=0;i<10;i++) particles.push(new Particle(t))
}

</script>

</body>
</html>

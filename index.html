<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EcoCity Builder v3</title>

<style>

body{
background:#0b1320;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
border:2px solid #23304a;
margin-top:10px;
}

button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>EcoCity Builder v3</h1>

<canvas id="map" width="720" height="480"></canvas>

<div>

<button onclick="tool='park'">🌳 Park</button>
<button onclick="tool='solar'">☀ Solar</button>
<button onclick="tool='capture'">🧪 Carbon Capture</button>
<button onclick="tool='transit'">🚇 Transit</button>

</div>

<div>

Year: <span id="year">2025</span> |
CO₂: <span id="co2">100</span> |
Temp: <span id="temp">1.2</span>°C |
Sea: <span id="sea">0</span>

</div>

<script>

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

const cell=30
const rows=16
const cols=24

let map=[]
let tool="park"

let co2=100
let temp=1.2
let sea=0
let year=2025

/* CREATE CITY MAP */

for(let r=0;r<rows;r++){

map[r]=[]

for(let c=0;c<cols;c++){

if(r<3) map[r][c]="forest"
else if(r===4) map[r][c]="river"
else if(r<9) map[r][c]="residential"
else if(r<11) map[r][c]="road"
else if(r<14) map[r][c]="industry"
else map[r][c]="coast"

}

}

/* BUILD */

canvas.onclick=function(e){

let rect=canvas.getBoundingClientRect()

let x=Math.floor((e.clientX-rect.left)/cell)
let y=Math.floor((e.clientY-rect.top)/cell)

let zone=map[y][x]

if(tool==="capture" && zone!=="industry") return
if(tool==="transit" && zone!=="road") return

map[y][x]=tool

}

/* EMISSIONS */

function calculate(){

co2=0

map.forEach(row=>{
row.forEach(c=>{

if(c==="industry") co2+=5
if(c==="road") co2+=1
if(c==="park") co2-=2
if(c==="solar") co2-=3
if(c==="capture") co2-=4
if(c==="forest") co2-=2
if(c==="river") co2-=2

})
})

}

/* CLIMATE */

function climate(){

temp=1.2+(co2/200)

sea+=temp*0.002

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,720,480)

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let t=map[r][c]

if(t==="forest") ctx.fillStyle="darkgreen"
else if(t==="river") ctx.fillStyle="blue"
else if(t==="residential") ctx.fillStyle="#4da6ff"
else if(t==="road") ctx.fillStyle="#222"
else if(t==="industry") ctx.fillStyle="#777"
else if(t==="coast") ctx.fillStyle="#e6d690"
else if(t==="park") ctx.fillStyle="green"
else if(t==="solar") ctx.fillStyle="yellow"
else if(t==="capture") ctx.fillStyle="cyan"
else if(t==="transit") ctx.fillStyle="purple"

ctx.fillRect(c*cell,r*cell,cell-1,cell-1)

}
}

/* FLOOD */

if(sea>10){

ctx.fillStyle="rgba(0,100,255,0.5)"
ctx.fillRect(0,420,720,60)

}

}

/* LOOP */

function loop(){

calculate()

climate()

draw()

year+=0.02

document.getElementById("year").innerText=Math.floor(year)
document.getElementById("co2").innerText=Math.floor(co2)
document.getElementById("temp").innerText=temp.toFixed(2)
document.getElementById("sea").innerText=sea.toFixed(2)

if(temp>2){

alert("Climate Crisis!")

location.reload()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

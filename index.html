<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoCity Builder</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#101522;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-top:15px;
}

.container{
display:flex;
gap:20px;
margin-top:10px;
}

canvas{
background:#1b2233;
border-radius:8px;
}

.panel{
width:260px;
background:#1b2233;
padding:15px;
border-radius:8px;
}

button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.stat{
margin-top:6px;
font-size:14px;
}

</style>

</head>

<body>

<h1>EcoCity Builder</h1>

<div class="container">

<canvas id="map" width="600" height="600"></canvas>

<div class="panel">

<h3>Build</h3>

<button onclick="tool='park'">🌳 Park</button>
<button onclick="tool='solar'">☀ Solar</button>
<button onclick="tool='housing'">🏢 Housing</button>
<button onclick="tool='industry'">🏭 Industry</button>
<button onclick="tool='transit'">🚇 Transit</button>

<h3>Stats</h3>

<div class="stat">Year: <span id="year">2025</span></div>
<div class="stat">CO₂: <span id="co2">0</span></div>
<div class="stat">Temperature: <span id="temp">1.2</span> °C</div>
<div class="stat">Economy: <span id="eco">100</span></div>
<div class="stat">Budget: <span id="budget">500</span></div>

</div>

</div>

<script>

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

const size=20
const cell=30

let grid=[]

let tool="park"

let year=2025
let co2=0
let temp=1.2
let economy=100
let budget=500

/* INIT GRID */

for(let r=0;r<size;r++){

grid[r]=[]

for(let c=0;c<size;c++){

grid[r][c]="empty"

}

}

/* CLICK BUILD */

canvas.addEventListener("click",e=>{

let rect=canvas.getBoundingClientRect()

let x=Math.floor((e.clientX-rect.left)/cell)
let y=Math.floor((e.clientY-rect.top)/cell)

let cost=50

if(tool==="solar") cost=80
if(tool==="industry") cost=120

if(budget<cost) return

budget-=cost

grid[y][x]=tool

})

/* CALCULATE CO2 */

function calculate(){

co2=0

grid.forEach(row=>{
row.forEach(cell=>{

if(cell==="industry") co2+=5
if(cell==="housing") co2+=2
if(cell==="solar") co2-=3
if(cell==="park") co2-=1
if(cell==="transit") co2-=2

})
})

}

/* CLIMATE */

function climate(){

temp=1.2+(co2/200)

}

/* ECONOMY */

function economyUpdate(){

economy+=grid.flat().filter(c=>c==="industry").length*0.05

}

/* DRAW MAP */

function draw(){

ctx.clearRect(0,0,600,600)

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

let type=grid[r][c]

if(type==="empty") ctx.fillStyle="#2a3248"
if(type==="park") ctx.fillStyle="green"
if(type==="solar") ctx.fillStyle="yellow"
if(type==="housing") ctx.fillStyle="#4da6ff"
if(type==="industry") ctx.fillStyle="#777"
if(type==="transit") ctx.fillStyle="purple"

ctx.fillRect(c*cell,r*cell,cell-1,cell-1)

}
}

}

/* GAME LOOP */

function loop(){

calculate()

climate()

economyUpdate()

draw()

year+=0.01
budget+=0.1

document.getElementById("year").innerText=Math.floor(year)
document.getElementById("co2").innerText(Math.floor(co2))
document.getElementById("temp").innerText(temp.toFixed(2))
document.getElementById("eco").innerText(Math.floor(economy))
document.getElementById("budget").innerText(Math.floor(budget))

if(temp>2){

alert("Climate Collapse")

location.reload()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosystem Dynamics Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

h2{margin-top:10px;}

.layout{
display:flex;
gap:20px;
margin-top:10px;
}

canvas{
background:#111827;
border-radius:10px;
}

.panel{
background:#1f2937;
padding:12px;
border-radius:10px;
width:220px;
}

button{
width:100%;
margin-top:6px;
padding:7px;
border:none;
border-radius:6px;
cursor:pointer;
background:#374151;
color:white;
}

.bottom{
display:flex;
gap:20px;
margin-top:15px;
}

</style>

</head>

<body>

<h2>Ecosystem Dynamics Simulator</h2>

<div class="layout">

<div class="panel">

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<hr>

<button onclick="addParticles('tree')">Add Trees</button>
<button onclick="addParticles('water')">Add Water</button>
<button onclick="addParticles('population')">Add Population</button>
<button onclick="addParticles('industry')">Add Industry</button>
<button onclick="addParticles('economy')">Add Economy</button>
<button onclick="addParticles('pollution')">Add Pollution</button>

<div id="equilibrium" style="margin-top:10px">
Equilibrium: No
</div>

</div>

<canvas id="world" width="700" height="420"></canvas>

<div class="panel">

<h4>Food Web</h4>
<canvas id="network" width="200" height="200"></canvas>

</div>

</div>

<div class="bottom">

<canvas id="popChart" width="420" height="220"></canvas>
<canvas id="phaseChart" width="420" height="220"></canvas>

</div>

<script>

/* ======================= */
/* BASIC SETTINGS */
/* ======================= */

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

let particles=[]
let running=false

const types=["tree","water","population","industry","economy","pollution"]

const colors={
tree:"#22c55e",
water:"#3b82f6",
population:"#ffffff",
industry:"#9ca3af",
economy:"#facc15",
pollution:"#ef4444"
}

/* ======================= */
/* PARTICLE CLASS */
/* ======================= */

class Particle{

constructor(type){

this.type=type
this.x=Math.random()*700
this.y=Math.random()*420
this.vx=(Math.random()-0.5)*2
this.vy=(Math.random()-0.5)*2

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>700) this.vx*=-1
if(this.y<0||this.y>420) this.vy*=-1

}

draw(){

ctx.fillStyle=colors[this.type]

switch(this.type){

case "tree":
ctx.fillRect(this.x,this.y,6,6)
break

case "water":
ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fill()
break

case "population":
ctx.beginPath()
ctx.moveTo(this.x,this.y-4)
ctx.lineTo(this.x-4,this.y+4)
ctx.lineTo(this.x+4,this.y+4)
ctx.fill()
break

case "industry":
ctx.fillRect(this.x,this.y,8,4)
break

case "economy":
ctx.fillRect(this.x,this.y,4,8)
break

case "pollution":
ctx.beginPath()
ctx.arc(this.x,this.y,3,0,Math.PI*2)
ctx.fill()
break

}

}

}

/* ======================= */
/* INITIAL PARTICLES */
/* ======================= */

function init(){

particles=[]

types.forEach(t=>{
for(let i=0;i<25;i++){
particles.push(new Particle(t))
}
})

}

init()

function addParticles(type){

for(let i=0;i<10;i++){
particles.push(new Particle(type))
}

}

/* ======================= */
/* INTERACTIONS */
/* ======================= */

function interact(a,b){

if(a.type==="tree" && b.type==="population"){
if(Math.random()<0.3)a.type="dead"
}

if(a.type==="water" && b.type==="tree"){
if(Math.random()<0.1)particles.push(new Particle("tree"))
}

if(a.type==="pollution" && b.type==="tree"){
if(Math.random()<0.4)a.type="dead"
}

if(a.type==="pollution" && b.type==="population"){
if(Math.random()<0.2)b.type="dead"
}

if(a.type==="industry" && b.type==="population"){
if(Math.random()<0.1)particles.push(new Particle("economy"))
if(Math.random()<0.1)particles.push(new Particle("pollution"))
}

}

/* ======================= */
/* COLLISIONS */
/* ======================= */

function collisions(){

for(let i=0;i<particles.length;i++){

for(let j=i+1;j<particles.length;j++){

let a=particles[i]
let b=particles[j]

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<6){
interact(a,b)
}

}

}

particles=particles.filter(p=>p.type!=="dead")

}

/* ======================= */
/* STATS */
/* ======================= */

function stats(){

let count={
tree:0,
water:0,
population:0,
industry:0,
economy:0,
pollution:0
}

particles.forEach(p=>count[p.type]++)

return count

}

/* ======================= */
/* CHARTS */
/* ======================= */

const popChart=new Chart(
document.getElementById("popChart"),
{
type:"line",
data:{
labels:[],
datasets:types.map(t=>({
label:t,
data:[],
borderColor:colors[t],
borderWidth:2,
pointRadius:0,
tension:0.35
}))
},
options:{
animation:false,
plugins:{legend:{labels:{color:"#9ca3af"}}},
scales:{
x:{grid:{color:"rgba(255,255,255,0.05)"},ticks:{display:false}},
y:{grid:{color:"rgba(255,255,255,0.05)"},ticks:{color:"#9ca3af"}}
}
}
}
)

const phaseChart=new Chart(
document.getElementById("phaseChart"),
{
type:"scatter",
data:{
datasets:[{
label:"Population vs Pollution",
data:[],
backgroundColor:"white",
pointRadius:3
}]
},
options:{
animation:false,
plugins:{legend:{labels:{color:"#9ca3af"}}},
scales:{
x:{title:{display:true,text:"Population",color:"#9ca3af"},ticks:{color:"#9ca3af"}},
y:{title:{display:true,text:"Pollution",color:"#9ca3af"},ticks:{color:"#9ca3af"}}
}
}
}
)

/* ======================= */
/* FOOD WEB */
/* ======================= */

function drawNetwork(){

const net=document.getElementById("network")
const nctx=net.getContext("2d")

nctx.clearRect(0,0,200,200)

const nodes={
tree:[100,30],
water:[30,100],
population:[100,170],
industry:[170,100],
pollution:[60,40],
economy:[140,40]
}

for(let k in nodes){

nctx.fillStyle=colors[k]
nctx.beginPath()
nctx.arc(nodes[k][0],nodes[k][1],8,0,Math.PI*2)
nctx.fill()

}

}

drawNetwork()

/* ======================= */
/* EQUILIBRIUM */
/* ======================= */

let history=[]

function checkEquilibrium(count){

history.push(count.population)

if(history.length>50)history.shift()

let max=Math.max(...history)
let min=Math.min(...history)

document.getElementById("equilibrium").innerText=
(max-min<5)?"Equilibrium: Yes":"Equilibrium: No"

}

/* ======================= */
/* UPDATE CHARTS */
/* ======================= */

function updateCharts(count){

popChart.data.labels.push("")
if(popChart.data.labels.length>120)popChart.data.labels.shift()

popChart.data.datasets.forEach((d,i)=>{
d.data.push(count[types[i]])
if(d.data.length>120)d.data.shift()
})

popChart.update()

phaseChart.data.datasets[0].data.push({
x:count.population,
y:count.pollution
})

if(phaseChart.data.datasets[0].data.length>200)
phaseChart.data.datasets[0].data.shift()

phaseChart.update()

}

/* ======================= */
/* MAIN LOOP */
/* ======================= */

function loop(){

ctx.clearRect(0,0,700,420)

particles.forEach(p=>{
p.move()
p.draw()
})

collisions()

let count=stats()

updateCharts(count)
checkEquilibrium(count)

if(running)requestAnimationFrame(loop)

}

/* ======================= */
/* CONTROLS */
/* ======================= */

function start(){running=true;loop()}
function pause(){running=false}
function reset(){init()}

</script>

</body>
</html>

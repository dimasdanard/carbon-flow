<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carbon City Defense</title>

<style>

body{
background:#0b1320;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

canvas{
border:2px solid #23304a;
margin-top:10px;
}

button{
padding:8px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Carbon City Defense</h1>

<canvas id="game" width="800" height="500"></canvas>

<div>

<button onclick="setTool('forest')">🌳 Forest</button>
<button onclick="setTool('solar')">☀ Solar</button>
<button onclick="setTool('capture')">🧪 Carbon Capture</button>

</div>

<div>

Year: <span id="year">2025</span> |
Temperature: <span id="temp">1.2</span> °C |
Sea Level: <span id="sea">0</span> cm

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const cell=40
const rows=12
const cols=20

let grid=[]

let towers=[]
let co2=[]

let tool="forest"

let year=2025
let temp=1.2
let sea=0

/* CREATE MAP */

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

if(r<3) grid[r][c]="industry"
else if(r<7) grid[r][c]="urban"
else if(r<10) grid[r][c]="green"
else grid[r][c]="coastal"

}

}

/* TOOL */

function setTool(t){
tool=t
}

/* CLICK */

canvas.onclick=function(e){

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let r=Math.floor(y/cell)
let c=Math.floor(x/cell)

let zone=grid[r][c]

/* VALIDATION */

if(tool==="forest" && zone!=="green") return
if(tool==="solar" && zone!=="urban") return
if(tool==="capture" && zone!=="industry") return

towers.push({r,c,type:tool})

}

/* SPAWN EMISSIONS */

function spawnCO2(){

for(let c=0;c<cols;c++){

if(grid[0][c]==="industry"){

co2.push({
x:c*cell+20,
y:20
})

}

}

}

/* UPDATE */

function update(){

co2.forEach(p=>{

p.y+=0.8

})

/* ABSORB */

towers.forEach(t=>{

co2=co2.filter(p=>{

let tx=t.c*cell+20
let ty=t.r*cell+20

let d=Math.hypot(p.x-tx,p.y-ty)

if(d<25){

if(t.type==="forest") return false
if(t.type==="capture") return false

}

return true

})

})

/* REACH ATMOSPHERE */

co2.forEach(p=>{

if(p.y>450){

temp+=0.02

}

})

/* SEA LEVEL */

sea+=temp*0.001

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,800,500)

/* MAP */

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let zone=grid[r][c]

if(zone==="industry") ctx.fillStyle="#555"
if(zone==="urban") ctx.fillStyle="#3a6ea5"
if(zone==="green") ctx.fillStyle="#2ecc71"
if(zone==="coastal") ctx.fillStyle="#d9c76e"

ctx.fillRect(c*cell,r*cell,cell,cell)

}

}

/* FLOOD */

if(sea>10){

ctx.fillStyle="rgba(0,100,255,0.5)"
ctx.fillRect(0,440,800,60)

}

/* CO2 */

co2.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

})

/* TOWERS */

towers.forEach(t=>{

let x=t.c*cell+20
let y=t.r*cell+20

if(t.type==="forest") ctx.fillStyle="darkgreen"
if(t.type==="solar") ctx.fillStyle="yellow"
if(t.type==="capture") ctx.fillStyle="cyan"

ctx.beginPath()
ctx.arc(x,y,10,0,Math.PI*2)
ctx.fill()

})

}

/* LOOP */

function gameLoop(){

spawnCO2()

update()

draw()

year+=0.02

document.getElementById("year").innerText=Math.floor(year)

document.getElementById("temp").innerText=temp.toFixed(2)

document.getElementById("sea").innerText=sea.toFixed(2)

if(temp>2){

alert("Climate Collapse!")

location.reload()

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>

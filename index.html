<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosystem Particle Simulator</title>

<style>

body{
background:#101522;
color:white;
font-family:Segoe UI;
text-align:center;
margin:0;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

canvas{
background:#0f1626;
border-radius:10px;
}

.panel{
width:200px;
background:#1c2338;
padding:10px;
border-radius:10px;
}

button{
width:100%;
margin-top:6px;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.stat{
font-size:13px;
margin-top:5px;
}

</style>

</head>

<body>

<h2>Ecosystem Particle Simulation</h2>

<div class="container">

<div class="panel">

<button onclick="addParticles('tree')">Add Trees</button>
<button onclick="addParticles('water')">Add Water</button>
<button onclick="addParticles('population')">Add Population</button>
<button onclick="addParticles('industry')">Add Industry</button>
<button onclick="addParticles('economy')">Add Economy</button>
<button onclick="addParticles('pollution')">Add Pollution</button>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<div class="stat">Trees: <span id="tree">0</span></div>
<div class="stat">Water: <span id="water">0</span></div>
<div class="stat">Population: <span id="pop">0</span></div>
<div class="stat">Industry: <span id="ind">0</span></div>
<div class="stat">Economy: <span id="eco">0</span></div>
<div class="stat">Pollution: <span id="pol">0</span></div>

</div>

<canvas id="world" width="700" height="500"></canvas>

</div>

<script>

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

let particles=[]
let running=false

const colors={
tree:"green",
water:"blue",
population:"white",
industry:"gray",
economy:"gold",
pollution:"red"
}

class Particle{

constructor(type){

this.type=type
this.x=Math.random()*700
this.y=Math.random()*500

this.vx=(Math.random()-0.5)*1.5
this.vy=(Math.random()-0.5)*1.5

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>700) this.vx*=-1
if(this.y<0||this.y>500) this.vy*=-1

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fillStyle=colors[this.type]
ctx.fill()

}

}

/* ADD PARTICLES */

function addParticles(type){

for(let i=0;i<10;i++){

particles.push(new Particle(type))

}

}

/* INITIAL */

function init(){

const types=["tree","water","population","industry","economy","pollution"]

types.forEach(t=>{
for(let i=0;i<50;i++){
particles.push(new Particle(t))
}
})

}

init()

/* INTERACTIONS */

function interact(a,b){

if(a.type==="tree" && b.type==="population"){
a.type="empty"
b.type="population"
}

if(a.type==="pollution" && b.type==="tree"){
a.type="empty"
}

if(a.type==="water" && b.type==="tree"){
b.type="tree"
}

if(a.type==="water" && b.type==="pollution"){
a.type="empty"
b.type="pollution"
}

if(a.type==="industry" && b.type==="population"){
particles.push(new Particle("economy"))
particles.push(new Particle("pollution"))
}

if(a.type==="population" && b.type==="economy"){
particles.push(new Particle("population"))
}

if(a.type==="pollution" && b.type==="population"){
b.type="empty"
}

}

/* COLLISION */

function collisions(){

for(let i=0;i<particles.length;i++){

for(let j=i+1;j<particles.length;j++){

let a=particles[i]
let b=particles[j]

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<6){

interact(a,b)

}

}

}

particles=particles.filter(p=>p.type!=="empty")

}

/* UPDATE STATS */

function stats(){

let count={
tree:0,
water:0,
population:0,
industry:0,
economy:0,
pollution:0
}

particles.forEach(p=>count[p.type]++)

document.getElementById("tree").innerText=count.tree
document.getElementById("water").innerText=count.water
document.getElementById("pop").innerText=count.population
document.getElementById("ind").innerText=count.industry
document.getElementById("eco").innerText=count.economy
document.getElementById("pol").innerText=count.pollution

}

/* LOOP */

function loop(){

ctx.clearRect(0,0,700,500)

particles.forEach(p=>{
p.move()
p.draw()
})

collisions()

stats()

if(running) requestAnimationFrame(loop)

}

/* CONTROLS */

function start(){

running=true
loop()

}

function pause(){

running=false

}

function reset(){

particles=[]
init()

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosystem Dynamics Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

h2{margin:12px;}

.dashboard{
display:grid;
grid-template-columns:220px 720px 220px;
gap:20px;
}

.panel{
background:#1f2937;
border-radius:10px;
padding:12px;
}

canvas{
background:#111827;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
background:#374151;
color:white;
cursor:pointer;
}

.chart{
margin-top:20px;
width:1000px;
}

</style>

</head>

<body>

<h2>Ecosystem Dynamics Simulator</h2>

<div class="dashboard">

<div class="panel">

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<hr>

<button onclick="addParticles('tree')">Add Trees</button>
<button onclick="addParticles('water')">Add Water</button>
<button onclick="addParticles('population')">Add Population</button>
<button onclick="addParticles('industry')">Add Industry</button>
<button onclick="addParticles('economy')">Add Economy</button>
<button onclick="addParticles('pollution')">Add Pollution</button>

<div id="equilibrium" style="margin-top:10px">
Equilibrium: No
</div>

</div>

<canvas id="world" width="720" height="420"></canvas>

<div class="panel">

<h4>Food Web</h4>
<canvas id="network" width="200" height="200"></canvas>

</div>

</div>

<div class="chart">
<canvas id="popChart"></canvas>
</div>

<script>

/* BASIC SETTINGS */

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

let particles=[]
let running=false

const types=["tree","water","population","industry","economy","pollution"]

const colors={
tree:"#22c55e",
water:"#3b82f6",
population:"#ffffff",
industry:"#9ca3af",
economy:"#facc15",
pollution:"#ef4444"
}

/* PARTICLE */

class Particle{

constructor(type){

this.type=type
this.x=Math.random()*720
this.y=Math.random()*420
this.vx=(Math.random()-0.5)*2
this.vy=(Math.random()-0.5)*2

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>720) this.vx*=-1
if(this.y<0||this.y>420) this.vy*=-1

}

draw(){

ctx.fillStyle=colors[this.type]

ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fill()

}

}

/* INITIAL POPULATION */

function init(){

particles=[]

types.forEach(t=>{
for(let i=0;i<25;i++){
particles.push(new Particle(t))
}
})

}

init()

function addParticles(type){

for(let i=0;i<10;i++){
particles.push(new Particle(type))
}

}

/* INTERACTIONS */

function interact(a,b){

if(a.type==="tree" && b.type==="population"){
if(Math.random()<0.25)a.type="dead"
}

if(a.type==="water" && b.type==="tree"){
if(Math.random()<0.1)particles.push(new Particle("tree"))
}

if(a.type==="pollution" && b.type==="tree"){
if(Math.random()<0.4)a.type="dead"
}

if(a.type==="pollution" && b.type==="population"){
if(Math.random()<0.25)b.type="dead"
}

if(a.type==="industry" && b.type==="population"){
if(Math.random()<0.1)particles.push(new Particle("economy"))
}

if(a.type==="industry" && b.type==="tree"){
if(Math.random()<0.1)particles.push(new Particle("pollution"))
}

if(a.type==="economy" && b.type==="population"){
if(Math.random()<0.08)particles.push(new Particle("population"))
}

}

/* RAIN CYCLE */

function rainCycle(){

let treeCount=particles.filter(p=>p.type==="tree").length
let pollutionCount=particles.filter(p=>p.type==="pollution").length

let rainChance=0.002 + treeCount*0.0001 - pollutionCount*0.00005

if(Math.random()<rainChance){
particles.push(new Particle("water"))
}

}

/* COLLISIONS */

function collisions(){

for(let i=0;i<particles.length;i++){

for(let j=i+1;j<particles.length;j++){

let a=particles[i]
let b=particles[j]

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<6){
interact(a,b)
}

}

}

particles=particles.filter(p=>p.type!=="dead")

}

/* STATS */

function stats(){

let c={}

types.forEach(t=>c[t]=0)

particles.forEach(p=>c[p.type]++)

return c

}

/* GRAPH */

const popChart=new Chart(
document.getElementById("popChart"),
{
type:"line",
data:{
labels:[],
datasets:types.map(t=>({
label:t,
data:[],
borderColor:colors[t],
borderWidth:2,
pointRadius:0,
tension:0.3
}))
},
options:{animation:false}
}
)

/* FOOD WEB */

function arrow(ctx,x1,y1,x2,y2){

ctx.strokeStyle="#9ca3af"

ctx.beginPath()
ctx.moveTo(x1,y1)
ctx.lineTo(x2,y2)
ctx.stroke()

}

function drawNetwork(){

const net=document.getElementById("network")
const nctx=net.getContext("2d")

nctx.clearRect(0,0,200,200)

const nodes={
tree:[100,30],
water:[30,100],
population:[100,170],
industry:[170,100],
pollution:[60,50],
economy:[140,50],
rain:[100,70]
}

arrow(nctx,100,70,30,100) // rain → water
arrow(nctx,30,100,100,30) // water → tree
arrow(nctx,100,30,100,170) // tree → population
arrow(nctx,100,170,170,100) // population → industry
arrow(nctx,170,100,140,50) // industry → economy
arrow(nctx,170,100,60,50) // industry → pollution
arrow(nctx,60,50,100,170) // pollution → population
arrow(nctx,60,50,100,30) // pollution → tree
arrow(nctx,100,30,100,70) // tree → rain

for(let k in nodes){

let color=colors[k] || "#60a5fa"

nctx.fillStyle=color
nctx.beginPath()
nctx.arc(nodes[k][0],nodes[k][1],8,0,Math.PI*2)
nctx.fill()

}

}

drawNetwork()

/* EQUILIBRIUM */

let history=[]

function checkEquilibrium(c){

history.push(c.population)

if(history.length>40)history.shift()

let max=Math.max(...history)
let min=Math.min(...history)

document.getElementById("equilibrium").innerText=
(max-min<5)?"Equilibrium: Yes":"Equilibrium: No"

}

/* UPDATE GRAPH */

function updateCharts(c){

popChart.data.labels.push("")

types.forEach((t,i)=>{
popChart.data.datasets[i].data.push(c[t])
})

popChart.update()

}

/* LOOP */

function loop(){

ctx.clearRect(0,0,720,420)

particles.forEach(p=>{
p.move()
p.draw()
})

collisions()
rainCycle()

let c=stats()

updateCharts(c)
checkEquilibrium(c)

if(running)requestAnimationFrame(loop)

}

/* CONTROLS */

function start(){running=true;loop()}
function pause(){running=false}
function reset(){init()}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carbon Crisis</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#0b1320;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:10px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:10px;
}

.panel{
background:#162033;
padding:15px;
border-radius:10px;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.policy{
background:#2ecc71;
color:black;
}

.bad{
background:#e74c3c;
}

.metric{
margin-top:6px;
}

.earth{
font-size:120px;
transition:0.5s;
}

</style>

</head>

<body>

<h1>Carbon Crisis</h1>
<p>You are the Global Climate Minister</p>

<div class="earth" id="earth">🌍</div>

<div class="container">

<div class="panel">

<h3>World Status</h3>

<div class="metric">Year: <span id="year">2025</span></div>
<div class="metric">CO₂: <span id="co2">420</span> ppm</div>
<div class="metric">Temperature: <span id="temp">1.2</span> °C</div>
<div class="metric">Global Economy: <span id="gdp">100</span></div>

<h3>Climate Event</h3>

<div id="event">No major events</div>

<button onclick="nextTurn()">Next 5 Years</button>

</div>


<div class="panel">

<h3>Choose Policies</h3>

<button class="policy" onclick="policySolar()">
Expand Solar Power<br>
(-4 emissions, -2 economy)
</button>

<button class="policy" onclick="policyEV()">
Electric Vehicle Transition<br>
(-3 emissions, -1 economy)
</button>

<button class="policy" onclick="policyForest()">
Forest Restoration<br>
(-2 emissions, +1 biodiversity)
</button>

<button class="bad" onclick="policyCoal()">
Expand Coal Industry<br>
(+6 emissions, +4 economy)
</button>

</div>

</div>


<script>

let year=2025
let co2=420
let temp=1.2
let gdp=100

let emissions=10

function updateUI(){

document.getElementById("year").innerText=year
document.getElementById("co2").innerText=co2.toFixed(1)
document.getElementById("temp").innerText=temp.toFixed(2)
document.getElementById("gdp").innerText=gdp

let earth=document.getElementById("earth")

if(temp<1.5){
earth.innerHTML="🌍"
}
else if(temp<2){
earth.innerHTML="🌎"
}
else{
earth.innerHTML="🔥"
}

checkGame()

}

function nextTurn(){

year+=5

co2+=emissions*0.6

temp=2.5*Math.log(co2/280)

randomEvent()

updateUI()

}

function randomEvent(){

let events=[
"Wildfires increase emissions",
"Green technology breakthrough",
"Climate protests demand action",
"Major hurricane damages economy",
"No major events"
]

let e=events[Math.floor(Math.random()*events.length)]

document.getElementById("event").innerText=e

if(e==="Wildfires increase emissions") emissions+=2
if(e==="Green technology breakthrough") emissions-=2
if(e==="Major hurricane damages economy") gdp-=5

}

function policySolar(){

emissions-=4
gdp-=2

}

function policyEV(){

emissions-=3
gdp-=1

}

function policyForest(){

emissions-=2
gdp+=1

}

function policyCoal(){

emissions+=6
gdp+=4

}

function checkGame(){

if(temp>2.5){

alert("Climate Collapse 🌍🔥")

location.reload()

}

if(gdp<=50){

alert("Economic Collapse 💸")

location.reload()

}

if(year>=2100 && temp<1.5){

alert("Victory! You Stabilized the Climate 🌱")

location.reload()

}

}

updateUI()

</script>

</body>
</html>

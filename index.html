<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carbon Defense</title>

<style>

body{
background:#0b1320;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

canvas{
background:#081020;
border:2px solid #23304a;
margin-top:10px;
}

.panel{
margin-top:10px;
}

button{
padding:8px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Carbon Defense</h1>

<canvas id="game" width="700" height="500"></canvas>

<div class="panel">

<button onclick="setTool('forest')">🌳 Forest</button>
<button onclick="setTool('solar')">☀ Solar</button>
<button onclick="setTool('capture')">🧪 Carbon Capture</button>

</div>

<div>

Year: <span id="year">2025</span> |
Temperature: <span id="temp">1.2</span> °C

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let tool="forest"

let towers=[]
let co2=[]

let year=2025
let temp=1.2

function setTool(t){
tool=t
}

canvas.onclick=function(e){

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

towers.push({x,y,type:tool})

}

/* CO2 SPAWN */

function spawnCO2(){

let side=Math.floor(Math.random()*4)

let x,y

if(side===0){x=0;y=Math.random()*500}
if(side===1){x=700;y=Math.random()*500}
if(side===2){x=Math.random()*700;y=0}
if(side===3){x=Math.random()*700;y=500}

co2.push({x,y})

}

/* UPDATE */

function update(){

co2.forEach(p=>{

let dx=350-p.x
let dy=250-p.y

p.x+=dx*0.002
p.y+=dy*0.002

})

/* ABSORB CO2 */

towers.forEach(t=>{

co2=co2.filter(p=>{

let d=Math.hypot(p.x-t.x,p.y-t.y)

if(d<40){

if(t.type==="forest") return false
if(t.type==="capture") return false

}

return true

})

})

/* CO2 REACH ATMOSPHERE */

co2.forEach(p=>{

let d=Math.hypot(p.x-350,p.y-250)

if(d<20){

temp+=0.02

}

})

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,700,500)

/* ATMOSPHERE */

ctx.beginPath()
ctx.arc(350,250,40,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

/* CO2 */

co2.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

})

/* TOWERS */

towers.forEach(t=>{

if(t.type==="forest") ctx.fillStyle="green"
if(t.type==="solar") ctx.fillStyle="yellow"
if(t.type==="capture") ctx.fillStyle="cyan"

ctx.beginPath()
ctx.arc(t.x,t.y,10,0,Math.PI*2)
ctx.fill()

})

}

/* GAME LOOP */

function gameLoop(){

spawnCO2()

update()

draw()

year+=0.02

document.getElementById("year").innerText=Math.floor(year)

document.getElementById("temp").innerText=temp.toFixed(2)

if(temp>2){

alert("Climate Collapse!")

location.reload()

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>

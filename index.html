<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carbon Crisis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#0b1320;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:10px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:10px;
}

.panel{
background:#162033;
padding:15px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card{
background:#1f2d48;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#2ecc71;
color:black;
}

.metric{
margin-top:6px;
}

#earthCanvas{
width:400px;
height:400px;
}

.flood{
color:#4da6ff;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Carbon Crisis</h1>

<select id="levelSelect">
<option value="paris">Paris Agreement (1.5°C)</option>
<option value="netzero">Net Zero 2050</option>
<option value="twodeg">2°C World</option>
</select>

<div class="container">

<canvas id="earthCanvas"></canvas>

<div class="panel">

<h3>World Status</h3>

<div class="metric">Year: <span id="year">2025</span></div>
<div class="metric">CO₂: <span id="co2">420</span> ppm</div>
<div class="metric">Temperature: <span id="temp">1.2</span> °C</div>
<div class="metric">Sea Level: <span id="sea">0</span> cm</div>
<div class="metric">Economy: <span id="gdp">100</span></div>

<div id="cityStatus"></div>

<button onclick="nextTurn()">Next 5 Years</button>

</div>

<div class="panel">

<h3>Policy Cards</h3>

<div class="card" onclick="applyPolicy('solar')">
☀ Expand Solar (-4 emissions, -2 economy)
</div>

<div class="card" onclick="applyPolicy('ev')">
🚗 Electric Vehicles (-3 emissions, -1 economy)
</div>

<div class="card" onclick="applyPolicy('forest')">
🌳 Reforestation (-2 emissions, +1 ecosystem)
</div>

<div class="card" onclick="applyPolicy('coal')">
🏭 Coal Expansion (+6 emissions, +4 economy)
</div>

</div>

</div>

<div style="width:80%;margin:auto;margin-top:20px">

<canvas id="climateChart"></canvas>

</div>

<script>

/* GAME VARIABLES */

let year=2025
let co2=420
let temp=1.2
let sea=0
let gdp=100
let emissions=10

/* THREE JS EARTH */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(45,1,0.1,1000)
camera.position.z=3

const renderer=new THREE.WebGLRenderer({canvas:earthCanvas,alpha:true})
renderer.setSize(400,400)

const geometry=new THREE.SphereGeometry(1,32,32)
const material=new THREE.MeshBasicMaterial({
map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg")
})

const earth=new THREE.Mesh(geometry,material)

scene.add(earth)

function animate(){
requestAnimationFrame(animate)
earth.rotation.y+=0.002
renderer.render(scene,camera)
}

animate()

/* CHART */

const ctx=document.getElementById("climateChart")

let chart=new Chart(ctx,{
type:"line",
data:{
labels:[year],
datasets:[
{
label:"CO₂ ppm",
data:[co2],
borderColor:"orange"
},
{
label:"Temperature °C",
data:[temp],
borderColor:"red"
}
]
}
})

/* POLICIES */

function applyPolicy(type){

if(type==="solar"){
emissions-=4
gdp-=2
}

if(type==="ev"){
emissions-=3
gdp-=1
}

if(type==="forest"){
emissions-=2
}

if(type==="coal"){
emissions+=6
gdp+=4
}

}

/* TURN */

function nextTurn(){

year+=5

co2+=emissions*0.5

temp=2.5*Math.log(co2/280)

sea+=temp*0.8

randomEvent()

updateUI()

updateChart()

checkCities()

checkGame()

}

/* EVENTS */

function randomEvent(){

let events=[
()=>{emissions+=2},
()=>{emissions-=2},
()=>{gdp-=5},
()=>{},
]

events[Math.floor(Math.random()*events.length)]()

}

/* CITY FLOOD */

function checkCities(){

let city=document.getElementById("cityStatus")

if(sea>20){
city.innerHTML="🏙 Coastal Cities Flooding"
city.className="flood"
}

}

/* UPDATE UI */

function updateUI(){

yearText.innerText=year
co2Text.innerText=co2.toFixed(1)
tempText.innerText=temp.toFixed(2)
seaText.innerText=sea.toFixed(1)
gdpText.innerText=gdp

}

/* CHART UPDATE */

function updateChart(){

chart.data.labels.push(year)
chart.data.datasets[0].data.push(co2)
chart.data.datasets[1].data.push(temp)

chart.update()

}

/* GAME END */

function checkGame(){

let level=document.getElementById("levelSelect").value

if(level==="paris" && temp>1.5){
alert("Paris Agreement Failed")
location.reload()
}

if(level==="netzero" && year>2050 && emissions>0){
alert("Net Zero Failed")
location.reload()
}

if(level==="twodeg" && temp>2){
alert("Climate Catastrophe")
location.reload()
}

if(year>=2100){
alert("Simulation Complete")
location.reload()
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EcoCity Builder</title>

<style>

body{
background:#0b1320;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
border:2px solid #23304a;
margin-top:10px;
}

button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>EcoCity Builder</h1>

<canvas id="map" width="600" height="600"></canvas>

<div>

<button onclick="tool='park'">🌳 Park</button>
<button onclick="tool='solar'">☀ Solar</button>
<button onclick="tool='housing'">🏢 Housing</button>
<button onclick="tool='industry'">🏭 Industry</button>
<button onclick="tool='transit'">🚇 Transit</button>

</div>

<div>

Year: <span id="year">2025</span> |
Temp: <span id="temp">1.2</span>°C |
Economy: <span id="eco">100</span> |
CO₂: <span id="co2">100</span>

</div>

<script>

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

const grid=20
const cell=30

let map=[]

let tool="park"

let year=2025
let temp=1.2
let economy=100
let co2=100

/* INIT MAP */

for(let r=0;r<grid;r++){

map[r]=[]

for(let c=0;c<grid;c++){

map[r][c]="empty"

}

}

/* BUILD */

canvas.onclick=function(e){

let rect=canvas.getBoundingClientRect()

let x=Math.floor((e.clientX-rect.left)/cell)
let y=Math.floor((e.clientY-rect.top)/cell)

map[y][x]=tool

}

/* EMISSIONS */

function calculate(){

co2=0

map.forEach(row=>{
row.forEach(cell=>{

if(cell==="industry") co2+=4
if(cell==="housing") co2+=1
if(cell==="solar") co2-=2
if(cell==="park") co2-=1
if(cell==="transit") co2-=2

})
})

}

/* CLIMATE */

function climate(){

temp=1.2+(co2/200)

}

/* ECONOMY */

function updateEconomy(){

economy+=co2*0.02

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,600,600)

for(let r=0;r<grid;r++){
for(let c=0;c<grid;c++){

let type=map[r][c]

if(type==="empty") ctx.fillStyle="#333"
if(type==="park") ctx.fillStyle="green"
if(type==="solar") ctx.fillStyle="yellow"
if(type==="housing") ctx.fillStyle="#4da6ff"
if(type==="industry") ctx.fillStyle="#666"
if(type==="transit") ctx.fillStyle="purple"

ctx.fillRect(c*cell,r*cell,cell-1,cell-1)

}
}

}

/* LOOP */

function loop(){

calculate()

climate()

updateEconomy()

draw()

year+=0.01

document.getElementById("year").innerText=Math.floor(year)
document.getElementById("temp").innerText=temp.toFixed(2)
document.getElementById("eco").innerText=Math.floor(economy)
document.getElementById("co2").innerText=Math.floor(co2)

if(temp>2){

alert("Climate Disaster!")

location.reload()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

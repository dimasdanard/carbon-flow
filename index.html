<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosystem Particle Simulation</title>

<style>

body{
background:#101522;
color:white;
font-family:Segoe UI;
text-align:center;
margin:0;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

canvas{
background:#0f1626;
border-radius:10px;
}

.panel{
width:220px;
background:#1c2338;
padding:10px;
border-radius:10px;
}

button{
width:100%;
margin-top:6px;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.legend{
text-align:left;
font-size:13px;
margin-top:10px;
}

.legend div{
display:flex;
align-items:center;
margin-bottom:4px;
}

.box{
width:14px;
height:14px;
margin-right:6px;
}

</style>

</head>

<body>

<h2>Ecosystem Particle Simulation</h2>

<div class="container">

<div class="panel">

<button onclick="addParticles('tree')">Add Trees</button>
<button onclick="addParticles('water')">Add Water</button>
<button onclick="addParticles('population')">Add Population</button>
<button onclick="addParticles('industry')">Add Industry</button>
<button onclick="addParticles('economy')">Add Economy</button>
<button onclick="addParticles('pollution')">Add Pollution</button>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<div class="legend">

<b>Legend</b>

<div><div class="box" style="background:green"></div>Tree</div>
<div><div class="box" style="background:blue"></div>Water</div>
<div><div class="box" style="background:white"></div>Population</div>
<div><div class="box" style="background:gray"></div>Industry</div>
<div><div class="box" style="background:gold"></div>Economy</div>
<div><div class="box" style="background:red"></div>Pollution</div>

</div>

</div>

<canvas id="world" width="750" height="520"></canvas>

</div>

<script>

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

let particles=[]
let running=false

const colors={
tree:"green",
water:"blue",
population:"white",
industry:"gray",
economy:"gold",
pollution:"red"
}

/* PARTICLE CLASS */

class Particle{

constructor(type){

this.type=type

this.x=Math.random()*750
this.y=Math.random()*520

this.vx=(Math.random()-0.5)*2
this.vy=(Math.random()-0.5)*2

}

move(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>750) this.vx*=-1
if(this.y<0||this.y>520) this.vy*=-1

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fillStyle=colors[this.type]
ctx.fill()

}

}

/* INITIAL PARTICLES */

function init(){

const types=["tree","water","population","industry","economy","pollution"]

types.forEach(type=>{

for(let i=0;i<25;i++){

particles.push(new Particle(type))

}

})

}

init()

/* ADD PARTICLES */

function addParticles(type){

for(let i=0;i<10;i++){

particles.push(new Particle(type))

}

}

/* INTERACTION RULES */

function interact(a,b){

/* tree + population */

if(a.type==="tree" && b.type==="population"){
a.type="dead"
particles.push(new Particle("population"))
}

/* pollution + tree */

if(a.type==="pollution" && b.type==="tree"){
a.type="dead"
}

/* water + tree */

if(a.type==="water" && b.type==="tree"){
particles.push(new Particle("tree"))
}

/* water + pollution */

if(a.type==="water" && b.type==="pollution"){
a.type="dead"
particles.push(new Particle("pollution"))
}

/* industry + population */

if(a.type==="industry" && b.type==="population"){
particles.push(new Particle("economy"))
particles.push(new Particle("pollution"))
}

/* population + economy */

if(a.type==="population" && b.type==="economy"){
particles.push(new Particle("population"))
}

/* pollution + population */

if(a.type==="pollution" && b.type==="population"){
b.type="dead"
}

}

/* COLLISIONS */

function collisions(){

for(let i=0;i<particles.length;i++){

for(let j=i+1;j<particles.length;j++){

let a=particles[i]
let b=particles[j]

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<6){

interact(a,b)

}

}

}

particles=particles.filter(p=>p.type!=="dead")

}

/* LOOP */

function loop(){

ctx.clearRect(0,0,750,520)

particles.forEach(p=>{
p.move()
p.draw()
})

collisions()

if(running) requestAnimationFrame(loop)

}

/* CONTROLS */

function start(){

running=true
loop()

}

function pause(){

running=false

}

function reset(){

particles=[]
init()

}

</script>

</body>
</html>
